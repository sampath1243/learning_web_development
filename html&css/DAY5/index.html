<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>Forms in HTML</h1>
        <form>
            <input type="text" placeholder="Enter Password" required>
            <input type="password" placeholder="Password" required>
            <input type="email" placeholder="Enter email">

            <input type="date">
            <input type="datetime-local">
            <input type="submit" value="log in">

            <input type="number">
            <input type="color">
            <input type="radio">

            <h3>Gender</h3>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female">
            <label for="female">female</label>

            <input type="radio" name="gender" id="others">
            <label for="others">others</label>

            <h3>Hobbies</h3>

            <input type="checkbox" name="hobbies" id="eating">
            <label for="eating">eating</label>

            <input type="checkbox" name="hobbies" id="sleeping">
            <label for="sleeping">sleeping</label>

            <input type="checkbox" name="hobbies" id="dreaming">
            <label for="dreaming">dreaming</label>

            <select name="" id="">
                <option value="">English</option>
                <option value="">Telugu</option>
                <option value="">Hindi</option>

            </select>

            <textarea name="" id="" rows="40" cols="50"></textarea>

            <input type="tel" placeholder="Enter phone number">

            <input type="file">

            <input type="url" placeholder="Enter website">
        </form>
        
    </body>
</html>
