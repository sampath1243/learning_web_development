<!-- Problem

Create a webpage with:

One <h1>
Two paragraphs
Requirements

ONLY the FIRST paragraph after <h1> should:

become green
font size 24px

Second paragraph should remain normal.

Rules

Use ONLY:

h1 + p -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1+p{
            color: green;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>Create a Webpage</h1>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
</body>
</html>
