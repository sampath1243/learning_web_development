<!-- Problem

Create a webpage with:

One <div>
one direct paragraph
one <section>
inside section one paragraph
Requirements

ONLY the direct paragraph inside div should:

become red
font size 22px

Paragraph inside <section> should remain normal.

Rules

Use ONLY:

div > p -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div > p{
            color: red;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div>
        <p>Lorem ipsum dolor sit amet.</p>
        <section>
            <p>Lorem ipsum dolor sit amet.</p>
        </section>
    </div>
</body>
</html>
