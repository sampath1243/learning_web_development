<!-- Problem 4 — Multiple Classes

Create a webpage with:

One <h1>
One paragraph
Requirements

The paragraph should:

become red
become center aligned
font size should become 30px
Rules

Use:

multiple classes -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red{
            color: red;

        }
        .center{
            text-align: center;
        }
        .large{
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>DAY 3 HTML & CSS CLASS</h1>
    <P class="red center large">Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolore, in.</P>
</body>
</html>
