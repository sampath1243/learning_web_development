<!-- Problem 2 — ID Selector

Create a webpage with:

One <h1>
Two paragraphs
Requirements
ONLY the heading should:
become red
center aligned
Paragraphs should remain normal.
Rules

Use:

ONLY id selector -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #title{
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 id="title">WELCOME TO WEB TECHNOLOGY CLASS</h1>
    <P>DAY 1</P>
    <p>HTML & CSS Basics</p>
</body>
</html>
