<!-- Next Challenge — Pseudo Class Selector :hover

Create a webpage with:

One button
Requirements

Normally button should:

blue background
white text

When mouse hovers over button:

background becomes red
Rules

Use:

button:hover -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: blue;
            color: white;
        }
        button:hover{
            background-color: red;
        }
    </style>
</head>
<body>
    <button>submit</button>
</body>
</html>
