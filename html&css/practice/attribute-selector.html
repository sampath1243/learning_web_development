<!-- Next Challenge — Attribute Selector

Create a webpage with:

Two <input> fields
One <p>
Requirements

ONLY the input with:

type="text"

should:

have green border
yellow background

The password input should remain normal.

Rules

Use:

input[type="text"] -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input[type="text"]{
            border: 2px solid green;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <input type="text" placeholder="email">
    <input type="password" placeholder="password">
    <p>Lorem ipsum dolor sit amet.</p>
    <button>submit</button>
</body>
</html>
